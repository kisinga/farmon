# =============================================================================
# Pump Controller — ESPHome
# =============================================================================
# All safety-critical logic lives HERE on the ESP32, not in HA.
# HA only sets mode (source/dest) and requests start/stop.
#
# Hardware:
#   1x pump relay (via relay board)
#   4x motorised ball valves, 2-pin each (via relay board)
#   1x pressure relief solenoid, normally closed (via relay board)
#   2x water flow sensors — House 1, House 2 (pulse counter)
#   2x tank level sensors — Tank 1, Tank 2 (analog)
#
# Topology:
#   Tank 1 → valve1 ──────────────────┐
#   Tank 2 → splitter → valve2 ───────┤→ PUMP → valve3 → Tank 2 inlet
#                └→ flow_house1 → H1   └──────→ valve4 → flow_house2 → H2
#
# State machine: IDLE → PREPARING → RUNNING → STOPPING → IDLE
#                         └──────→ FAULT ←──────┘
#
# Safety: "flow is truth"
#   - For House 2 ops (outlet=4): flow_house2 must detect flow within 30s.
#   - For refill ops (outlet=3): Tank 2 level must RISE within 60s.
#     (No flow sensor exists on the refill path.)
#   - No flow/no rise = FAULT regardless of cause.
# =============================================================================

substitutions:
  device_name: pump-controller
  friendly_name: Pump Controller
  update_interval: 5s

  # --- GPIO pins ---
  pin_pump_relay: GPIO16
  pin_valve1_o: GPIO17
  pin_valve1_c: GPIO18
  pin_valve2_o: GPIO19
  pin_valve2_c: GPIO5
  pin_valve3_o: GPIO22
  pin_valve3_c: GPIO23
  pin_valve4_o: GPIO25
  pin_valve4_c: GPIO26
  pin_pressure_relief: GPIO33
  pin_flow_house1: GPIO27
  pin_flow_house2: GPIO32
  pin_tank1_level: GPIO34
  pin_tank2_level: GPIO35

  # --- Timing ---
  valve_travel_time: "8s"
  max_runtime_seconds: "1800"          # 30 min hard ceiling
  flow_watchdog_seconds: "30"          # House 2 ops: no flow → fault
  refill_watchdog_seconds: "60"        # Refill ops: no level rise → fault
  refill_min_rise_pct: "0.5"           # Min Tank 2 rise in watchdog period
  api_watchdog_seconds: "300"          # 5 min API disconnect → fault

  # --- Flow calibration ---
  flow_cal: "450.0"

# =============================================================================
# Core
# =============================================================================

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    priority: -100
    then:
      - switch.turn_off: pump_relay
      - switch.turn_off: pressure_relief
      - cover.close: valve1
      - cover.close: valve2
      - cover.close: valve3
      - cover.close: valve4
      - lambda: |-
          id(system_state) = 0;
          id(pump_start_time) = 0;
          id(last_flow_time) = 0;
          id(api_lost_time) = 0;
          id(fault_code) = 0;
          id(refill_baseline_level) = -1.0f;
          id(refill_baseline_time) = 0;

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

captive_portal:

ota:
  - platform: esphome
    password: !secret ota_password

# =============================================================================
# Globals
# =============================================================================

globals:
  - id: system_state
    type: int
    initial_value: "0"
    # 0=IDLE, 1=PREPARING, 2=RUNNING, 3=STOPPING, 4=FAULT

  - id: pump_start_time
    type: uint32_t
    initial_value: "0"

  - id: last_flow_time
    type: uint32_t
    initial_value: "0"

  - id: api_lost_time
    type: uint32_t
    initial_value: "0"

  - id: fault_code
    type: int
    initial_value: "0"
    # 0=none, 1=no_flow, 2=no_level_rise, 3=max_runtime,
    # 4=api_lost, 5=source_empty

  - id: target_inlet
    type: int
    initial_value: "0"
    # 1=valve1 (tank1), 2=valve2 (tank2)

  - id: target_outlet
    type: int
    initial_value: "0"
    # 3=valve3 (tank2 refill), 4=valve4 (house2)

  # For refill watchdog: track Tank 2 level baseline
  - id: refill_baseline_level
    type: float
    initial_value: "-1.0"

  - id: refill_baseline_time
    type: uint32_t
    initial_value: "0"

# =============================================================================
# Switches
# =============================================================================

switch:
  - platform: gpio
    pin: ${pin_pump_relay}
    id: pump_relay
    name: "Pump Relay"
    icon: "mdi:water-pump"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - if:
          condition:
            lambda: 'return id(system_state) != 2;'
          then:
            - switch.turn_off: pump_relay
            - logger.log: {level: WARN, format: "BLOCKED: pump only runs in RUNNING state"}

  - platform: gpio
    pin: ${pin_pressure_relief}
    id: pressure_relief
    name: "Pressure Relief Solenoid"
    icon: "mdi:valve"
    restore_mode: ALWAYS_OFF

  # --- Ball valve motor pins (internal) ---
  - platform: gpio
    pin: ${pin_valve1_o}
    id: valve1_open_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: &v1 [valve1_open_pin, valve1_close_pin]
    interlock_wait_time: 100ms
  - platform: gpio
    pin: ${pin_valve1_c}
    id: valve1_close_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: *v1
    interlock_wait_time: 100ms
  - platform: gpio
    pin: ${pin_valve2_o}
    id: valve2_open_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: &v2 [valve2_open_pin, valve2_close_pin]
    interlock_wait_time: 100ms
  - platform: gpio
    pin: ${pin_valve2_c}
    id: valve2_close_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: *v2
    interlock_wait_time: 100ms
  - platform: gpio
    pin: ${pin_valve3_o}
    id: valve3_open_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: &v3 [valve3_open_pin, valve3_close_pin]
    interlock_wait_time: 100ms
  - platform: gpio
    pin: ${pin_valve3_c}
    id: valve3_close_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: *v3
    interlock_wait_time: 100ms
  - platform: gpio
    pin: ${pin_valve4_o}
    id: valve4_open_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: &v4 [valve4_open_pin, valve4_close_pin]
    interlock_wait_time: 100ms
  - platform: gpio
    pin: ${pin_valve4_c}
    id: valve4_close_pin
    internal: true
    restore_mode: ALWAYS_OFF
    interlock: *v4
    interlock_wait_time: 100ms

# =============================================================================
# Ball Valves (covers)
# =============================================================================

cover:
  - platform: time_based
    id: valve1
    name: "Valve 1 — Tank 1 Outlet"
    device_class: valve
    open_action:  [{switch.turn_on: valve1_open_pin}]
    close_action: [{switch.turn_on: valve1_close_pin}]
    stop_action:  [{switch.turn_off: valve1_open_pin}, {switch.turn_off: valve1_close_pin}]
    open_duration: ${valve_travel_time}
    close_duration: ${valve_travel_time}

  - platform: time_based
    id: valve2
    name: "Valve 2 — Tank 2 Outlet"
    device_class: valve
    open_action:  [{switch.turn_on: valve2_open_pin}]
    close_action: [{switch.turn_on: valve2_close_pin}]
    stop_action:  [{switch.turn_off: valve2_open_pin}, {switch.turn_off: valve2_close_pin}]
    open_duration: ${valve_travel_time}
    close_duration: ${valve_travel_time}

  - platform: time_based
    id: valve3
    name: "Valve 3 — Pump to Tank 2"
    device_class: valve
    open_action:  [{switch.turn_on: valve3_open_pin}]
    close_action: [{switch.turn_on: valve3_close_pin}]
    stop_action:  [{switch.turn_off: valve3_open_pin}, {switch.turn_off: valve3_close_pin}]
    open_duration: ${valve_travel_time}
    close_duration: ${valve_travel_time}

  - platform: time_based
    id: valve4
    name: "Valve 4 — Pump to House 2"
    device_class: valve
    open_action:  [{switch.turn_on: valve4_open_pin}]
    close_action: [{switch.turn_on: valve4_close_pin}]
    stop_action:  [{switch.turn_off: valve4_open_pin}, {switch.turn_off: valve4_close_pin}]
    open_duration: ${valve_travel_time}
    close_duration: ${valve_travel_time}

# =============================================================================
# Sensors
# =============================================================================

sensor:
  - platform: pulse_counter
    pin: {number: ${pin_flow_house1}, mode: INPUT_PULLUP}
    id: flow_house1
    name: "House 1 Water Flow"
    unit_of_measurement: "L/min"
    icon: "mdi:water"
    update_interval: ${update_interval}
    filters:
      - lambda: return x / ${flow_cal};

  - platform: pulse_counter
    pin: {number: ${pin_flow_house2}, mode: INPUT_PULLUP}
    id: flow_house2
    name: "House 2 Water Flow"
    unit_of_measurement: "L/min"
    icon: "mdi:water"
    update_interval: ${update_interval}
    filters:
      - lambda: return x / ${flow_cal};
    on_value:
      # Only flow_house2 updates the flow watchdog (it's the only flow sensor
      # in a pump path — the House 2 path via valve4).
      - lambda: |-
          if (x > 0.1f) id(last_flow_time) = millis();

  - platform: integration
    sensor: flow_house1
    name: "House 1 Total Usage"
    id: house1_total
    unit_of_measurement: "L"
    time_unit: min
    icon: "mdi:counter"

  - platform: integration
    sensor: flow_house2
    name: "House 2 Total Usage"
    id: house2_total
    unit_of_measurement: "L"
    time_unit: min
    icon: "mdi:counter"

  - platform: adc
    pin: ${pin_tank1_level}
    id: tank1_level
    name: "Tank 1 Level"
    unit_of_measurement: "%"
    icon: "mdi:storage-tank"
    update_interval: ${update_interval}
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 0.0 -> 0.0
          - 3.3 -> 100.0
      - clamp: {min_value: 0, max_value: 100}

  - platform: adc
    pin: ${pin_tank2_level}
    id: tank2_level
    name: "Tank 2 Level"
    unit_of_measurement: "%"
    icon: "mdi:storage-tank"
    update_interval: ${update_interval}
    attenuation: 12db
    filters:
      - calibrate_linear:
          - 0.0 -> 0.0
          - 3.3 -> 100.0
      - clamp: {min_value: 0, max_value: 100}

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

# =============================================================================
# Text sensors — state machine exposed to HA
# =============================================================================

text_sensor:
  - platform: template
    id: system_state_text
    name: "Pump System State"
    icon: "mdi:state-machine"
    update_interval: 2s
    lambda: |-
      const char* states[] = {"IDLE", "PREPARING", "RUNNING", "STOPPING", "FAULT"};
      int s = id(system_state);
      return std::string((s >= 0 && s <= 4) ? states[s] : "UNKNOWN");

  - platform: template
    id: fault_text
    name: "Pump Fault"
    icon: "mdi:alert-circle"
    update_interval: 2s
    lambda: |-
      const char* faults[] = {
        "None",
        "No flow detected (House 2 path)",
        "No level rise detected (refill path)",
        "Max runtime exceeded",
        "HA connection lost",
        "Source tank empty"
      };
      int f = id(fault_code);
      return std::string((f >= 0 && f <= 5) ? faults[f] : "Unknown");

# =============================================================================
# API + services
# =============================================================================

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    - lambda: 'id(api_lost_time) = 0;'
  on_client_disconnected:
    - lambda: 'id(api_lost_time) = millis();'
  services:
    - service: pump_start
      variables:
        inlet: int
        outlet: int
      then:
        - lambda: |-
            if (id(system_state) != 0) {
              ESP_LOGW("pump", "Rejected: state=%d, need IDLE", id(system_state));
              return;
            }
            if (inlet < 1 || inlet > 2 || outlet < 3 || outlet > 4) {
              ESP_LOGW("pump", "Rejected: invalid inlet=%d outlet=%d", inlet, outlet);
              return;
            }
            if (inlet == 2 && outlet == 3) {
              ESP_LOGW("pump", "Rejected: Tank 2 → Tank 2 loop");
              return;
            }
            float src = (inlet == 1) ? id(tank1_level).state : id(tank2_level).state;
            if (src < 5.0f) {
              ESP_LOGW("pump", "Rejected: source at %.0f%%", src);
              id(fault_code) = 5;
              id(system_state) = 4;
              return;
            }
            id(target_inlet) = inlet;
            id(target_outlet) = outlet;
            id(fault_code) = 0;
            id(system_state) = 1;
            ESP_LOGI("pump", "Start: inlet=%d outlet=%d src=%.0f%%", inlet, outlet, src);
        - if:
            condition:
              lambda: 'return id(system_state) == 1;'
            then:
              - script.execute: do_prepare_and_run

    - service: pump_stop
      then:
        - lambda: |-
            if (id(system_state) == 0 || id(system_state) == 3) return;
            ESP_LOGI("pump", "Stop requested");
        - script.execute: do_stop

    - service: fault_reset
      then:
        - lambda: |-
            if (id(system_state) != 4) return;
            id(fault_code) = 0;
            id(system_state) = 0;
            ESP_LOGI("pump", "Fault cleared → IDLE");

# =============================================================================
# Scripts
# =============================================================================

script:
  - id: do_prepare_and_run
    mode: single
    then:
      - switch.turn_off: pump_relay
      - delay: 500ms
      - cover.close: valve1
      - cover.close: valve2
      - cover.close: valve3
      - cover.close: valve4
      - delay: ${valve_travel_time}
      - delay: 1s
      - if:
          condition: {lambda: 'return id(system_state) != 1;'}
          then: [{script.stop: do_prepare_and_run}]
      - lambda: |-
          if (id(target_inlet) == 1) id(valve1).open();
          else id(valve2).open();
          if (id(target_outlet) == 3) id(valve3).open();
          else id(valve4).open();
      - delay: ${valve_travel_time}
      - delay: 1s
      - if:
          condition: {lambda: 'return id(system_state) != 1;'}
          then: [{script.stop: do_prepare_and_run}]
      - lambda: |-
          id(system_state) = 2;
          id(pump_start_time) = millis();
          id(last_flow_time) = millis();
          // For refill ops: snapshot Tank 2 level as baseline
          if (id(target_outlet) == 3) {
            id(refill_baseline_level) = id(tank2_level).state;
            id(refill_baseline_time) = millis();
          } else {
            id(refill_baseline_level) = -1.0f;
          }
          ESP_LOGI("pump", "RUNNING — watchdog armed");
      - switch.turn_on: pump_relay

  - id: do_stop
    mode: single
    then:
      - lambda: 'id(system_state) = 3;'
      - switch.turn_off: pump_relay
      - delay: 2s
      - cover.close: valve1
      - cover.close: valve2
      - cover.close: valve3
      - cover.close: valve4
      - delay: ${valve_travel_time}
      - delay: 1s
      - lambda: |-
          id(system_state) = 0;
          id(target_inlet) = 0;
          id(target_outlet) = 0;
          ESP_LOGI("pump", "IDLE");

  - id: do_fault
    mode: single
    then:
      - lambda: 'id(system_state) = 4;'
      - switch.turn_off: pump_relay
      - switch.turn_on: pressure_relief
      - delay: 10s
      - switch.turn_off: pressure_relief
      - cover.close: valve1
      - cover.close: valve2
      - cover.close: valve3
      - cover.close: valve4
      - delay: ${valve_travel_time}
      - lambda: 'ESP_LOGE("pump", "FAULT %d — awaiting reset", id(fault_code));'

# =============================================================================
# Safety monitor — every 2s on ESP32
# =============================================================================
# Two watchdog strategies depending on which flow path is active:
#   outlet=4 (House 2):  flow_house2 must detect pulses (flow_watchdog_seconds)
#   outlet=3 (Refill):   tank2_level must rise (refill_watchdog_seconds)
#     No flow sensor exists on the Tank 1 → pump → Tank 2 path.

interval:
  - interval: 2s
    then:
      - lambda: |-
          if (id(system_state) != 2) return;
          uint32_t now = millis();
          uint32_t runtime = now - id(pump_start_time);

          // --- WATCHDOG: path-dependent ---
          if (id(fault_code) == 0) {
            if (id(target_outlet) == 4) {
              // House 2 path: check flow sensor
              if (runtime > (${flow_watchdog_seconds} * 1000U)) {
                uint32_t age = now - id(last_flow_time);
                if (age > (${flow_watchdog_seconds} * 1000U)) {
                  ESP_LOGE("safety", "No flow for %us on House 2 path", age / 1000);
                  id(fault_code) = 1;
                }
              }
            } else {
              // Refill path: check Tank 2 level is rising
              if (runtime > (${refill_watchdog_seconds} * 1000U)) {
                float current = id(tank2_level).state;
                float baseline = id(refill_baseline_level);
                uint32_t baseline_age = now - id(refill_baseline_time);
                if (baseline_age > (${refill_watchdog_seconds} * 1000U)) {
                  float rise = current - baseline;
                  if (rise < ${refill_min_rise_pct}) {
                    ESP_LOGE("safety", "Tank 2 rise %.1f%% < min %.1f%% in %us",
                             rise, (float)${refill_min_rise_pct}, baseline_age / 1000);
                    id(fault_code) = 2;
                  } else {
                    // Reset baseline for next window
                    id(refill_baseline_level) = current;
                    id(refill_baseline_time) = now;
                  }
                }
              }
            }
          }

          // --- MAX RUNTIME ---
          if (id(fault_code) == 0 && runtime > (${max_runtime_seconds} * 1000U)) {
            ESP_LOGE("safety", "Max runtime exceeded");
            id(fault_code) = 3;
          }

          // --- API WATCHDOG ---
          if (id(fault_code) == 0 && id(api_lost_time) > 0) {
            uint32_t age = now - id(api_lost_time);
            if (age > (${api_watchdog_seconds} * 1000U)) {
              ESP_LOGE("safety", "API lost %us", age / 1000);
              id(fault_code) = 4;
            }
          }

          // --- SOURCE TANK DEPLETED ---
          if (id(fault_code) == 0) {
            float lvl = (id(target_inlet) == 1) ? id(tank1_level).state : id(tank2_level).state;
            if (lvl < 3.0f) {
              ESP_LOGE("safety", "Source depleted: %.0f%%", lvl);
              id(fault_code) = 5;
            }
          }

      - if:
          condition:
            lambda: 'return id(system_state) == 2 && id(fault_code) != 0;'
          then:
            - script.execute: do_fault
