# =============================================================================
# Heltec WiFi LoRa 32 V3 — ESPHome Foundation
# =============================================================================
# Board: ESP32-S3 | OLED: SSD1306 128x64 (I2C) | LoRa: SX1262 (reserved)
#
# Reference: https://devices.esphome.io/devices/heltec-wifi-lora-32-v3/
#
# Key hardware notes:
#   - OLED powered via Vext gate on GPIO36 (active-low, must be ON)
#   - OLED reset on GPIO21
#   - OLED I2C: SDA=GPIO17, SCL=GPIO18
#   - LoRa SPI: CLK=GPIO9, MOSI=GPIO10, MISO=GPIO11 (declared to reserve)
#   - Onboard LED: GPIO35
# =============================================================================

substitutions:
  device_name: heltec
  friendly_name: Heltec V3
  update_interval: 30s

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  variant: esp32s3
  flash_size: 8MB
  cpu_frequency: 240MHZ
  framework:
    type: esp-idf

logger:
  hardware_uart: UART0

# --- Networking -----------------------------------------------------------

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_password

captive_portal:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# --- Buses ----------------------------------------------------------------
# Declare SPI even if LoRa isn't used yet — reserves the pins and avoids
# accidental conflicts when adding the radio later.

spi:
  clk_pin: GPIO9
  mosi_pin: GPIO10
  miso_pin: GPIO11

i2c:
  sda: GPIO17
  scl: GPIO18
  frequency: 400kHz

# --- Vext power gate & LED ------------------------------------------------
# Vext controls power to the OLED (and external peripherals).
# Active-low: inverted + ALWAYS_ON keeps the display powered.

switch:
  - platform: gpio
    pin: GPIO36
    id: vext
    name: "Vext Control"
    inverted: true
    restore_mode: ALWAYS_ON

output:
  - platform: gpio
    pin: GPIO35
    id: led_output

light:
  - platform: binary
    name: "Onboard LED"
    output: led_output

# --- Sensors (sample telemetry) -------------------------------------------

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: ${update_interval}
    id: wifi_dbm

  - platform: uptime
    name: "Uptime"
    update_interval: ${update_interval}
    id: uptime_sec

  - platform: internal_temperature
    name: "ESP32 Temperature"
    update_interval: ${update_interval}
    id: esp_temp

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ip_addr
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

# --- OLED Display ---------------------------------------------------------

font:
  - file: "gfonts://Roboto"
    id: font_large
    size: 14
  - file: "gfonts://Roboto"
    id: font_small
    size: 10

display:
  - platform: ssd1306_i2c
    model: "SSD1306 128x64"
    reset_pin: GPIO21
    address: 0x3C
    id: oled
    update_interval: 1s
    pages:
      - id: page_status
        lambda: |-
          it.fill(COLOR_OFF);
          it.printf(0, 0, id(font_large), "${friendly_name}");
          if (id(ip_addr).has_state()) {
            it.printf(0, 18, id(font_small), "IP: %s", id(ip_addr).state.c_str());
          }
          if (id(wifi_dbm).has_state()) {
            it.printf(0, 30, id(font_small), "WiFi: %.0f dBm", id(wifi_dbm).state);
          }
          if (id(esp_temp).has_state()) {
            it.printf(0, 42, id(font_small), "Temp: %.1f C", id(esp_temp).state);
          }
          if (id(uptime_sec).has_state()) {
            int total = (int)id(uptime_sec).state;
            int h = total / 3600;
            int m = (total % 3600) / 60;
            it.printf(0, 54, id(font_small), "Up: %dh %dm", h, m);
          }

      - id: page_wifi
        lambda: |-
          it.fill(COLOR_OFF);
          it.printf(0, 0, id(font_large), "WiFi Signal");
          if (id(wifi_dbm).has_state()) {
            it.printf(0, 24, id(font_large), "%.0f dBm", id(wifi_dbm).state);
            int bar = (int)((100.0 + id(wifi_dbm).state) * 1.28);
            if (bar < 0) bar = 0;
            if (bar > 128) bar = 128;
            it.filled_rectangle(0, 48, bar, 12);
          }

interval:
  - interval: 5s
    then:
      - display.page.show_next: oled
      - component.update: oled
