<div class="min-h-screen flex flex-col bg-base-200">
  <!-- Navbar -->
  <header class="navbar bg-base-100 border-b border-base-200 px-4 md:px-6 sticky top-0 z-30 shadow-sm">
    <div class="navbar-start">
      <a routerLink="/" class="btn btn-ghost gap-2 px-2 text-lg font-semibold" aria-label="Farm Monitor home">
        <img src="/favicon.ico" alt="" class="size-8 rounded-lg shrink-0" width="32" height="32" />
        <span class="text-primary">Farm</span>
        <span>Monitor</span>
      </a>
    </div>
    <div class="navbar-center hidden md:flex">
      <ul class="menu menu-horizontal menu-lg gap-1 p-0">
        <li>
          <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="rounded-lg">
            Devices
          </a>
        </li>
        <li>
          <a routerLink="/lorawan" routerLinkActive="active" class="rounded-lg">
            LoRaWAN
          </a>
        </li>
      </ul>
    </div>
    <div class="navbar-end gap-2">
      <app-gateway-status-indicator />
      <!-- Mobile menu: dropdown -->
      <div class="dropdown dropdown-end md:hidden">
        <label tabindex="0" class="btn btn-ghost btn-square">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </label>
        <ul tabindex="0" class="menu dropdown-content bg-base-100 rounded-box z-40 mt-3 w-52 border border-base-200 p-2 shadow-xl">
          <li><a routerLink="/" (click)="closeDropdown($event)">Devices</a></li>
          <li><a routerLink="/lorawan" (click)="closeDropdown($event)">LoRaWAN</a></li>
        </ul>
      </div>
    </div>
  </header>

  <!-- Slim warning when gateway offline (non-blocking) -->
  @if (showGatewayWarning()) {
    <div class="bg-warning/15 text-warning-content border-b border-warning/30 px-4 py-2 flex items-center justify-center gap-2 text-sm">
      <span>Gateway offline — device uplinks may not be received.</span>
      <a routerLink="/lorawan" class="link link-hover font-medium underline">Check LoRaWAN</a>
    </div>
  }

  <!-- Main content -->
  <main class="flex-1 w-full max-w-6xl mx-auto px-4 md:px-6 py-6 md:py-8">
    <router-outlet />
  </main>
</div>
