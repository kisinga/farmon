# ChirpStack v4 — pi: no global MQTT/AMQP/Kafka; HTTP is per-application (see below)
# Docs: https://www.chirpstack.io/docs/chirpstack/configuration.html

[logging]
level = "info"

[postgresql]
dsn = "postgres://chirpstack:chirpstack@postgres/chirpstack?sslmode=disable"
max_open_connections = 10

[redis]
servers = ["redis://redis/"]

[network]
net_id = "000000"
enabled_regions = ["us915_0", "eu868"]

[api]
bind = "0.0.0.0:8080"
secret = "change-this-secret-in-production"

[gateway]
allow_unknown_gateways = true

# Global integrations: only MQTT/Redis/PostgreSQL/AMQP/Kafka go in "enabled".
# HTTP is per-application: in ChirpStack UI go to Application → Integrations → HTTP,
# set event endpoint to http://backend:8090/api/chirpstack and enable JSON.
[integration]
enabled = []
