# pi: ChirpStack + PocketBase backend + Angular frontend
# ChirpStack gateway backend uses MQTT (region_*.toml); integrations use HTTP (per-application in UI).
# Backend lives in ./backend; frontend build can be in backend/pb_public or embedded.

services:
  postgres:
    image: postgres:15-alpine
    container_name: pi-postgres
    restart: unless-stopped
    volumes:
      - pi_postgres_data:/var/lib/postgresql/data
      - ./backend/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      - TZ=Africa/Nairobi
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chirpstack}
    networks:
      - pi_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: pi-redis
    restart: unless-stopped
    volumes:
      - pi_redis_data:/data
    environment:
      - TZ=Africa/Nairobi
    networks:
      - pi_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: pi-mosquitto
    restart: unless-stopped
    # ChirpStack gateway backend (region_*.toml) connects here; Gateway Bridge can publish from gateways.
    ports:
      - "1883:1883"
    environment:
      - TZ=Africa/Nairobi
    networks:
      - pi_network

  chirpstack:
    image: chirpstack/chirpstack:4
    container_name: pi-chirpstack
    restart: unless-stopped
    command: -c /etc/chirpstack
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    ports:
      - "8080:8080"
    volumes:
      - ./chirpstack/server:/etc/chirpstack:ro
    environment:
      - TZ=Africa/Nairobi
    networks:
      - pi_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pi-backend
    restart: unless-stopped
    depends_on:
      - chirpstack
    ports:
      - "8090:8090"
    volumes:
      - pi_pb_data:/app/pb_data
    environment:
      - TZ=Africa/Nairobi
      - POCKETBASE_CHIRPSTACK_URL=http://chirpstack:8080
      - CHIRPSTACK_GRPC_ADDR=chirpstack:8080
      - CHIRPSTACK_API_KEY=${CHIRPSTACK_API_KEY:-}
    networks:
      - pi_network

volumes:
  pi_postgres_data:
  pi_redis_data:
  pi_pb_data:

networks:
  pi_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
