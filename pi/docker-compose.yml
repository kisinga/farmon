# pi: PocketBase backend (LoRaWAN + codec + store) + Angular frontend
# No ChirpStack/MQTT/Postgres/Redis. Backend talks to Concentratord via ZMQ when configured.
# Device provisioning: POST /api/devices, GET /api/devices/credentials?eui=...
#
# On Pi with concentratord (after setup_gateway.sh): create .env in this directory with:
#   CONCENTRATORD_EVENT_URL=ipc:///tmp/concentratord_event
#   CONCENTRATORD_COMMAND_URL=ipc:///tmp/concentratord_command
#   CONCENTRATORD_GATEWAY_ID=local
# Then: docker compose up -d (backend will mount /tmp to reach concentratord IPC).

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pi-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pi_pb_data:/app/pb_data
      # Mount host /tmp so backend can use concentratord IPC (ipc:///tmp/...) when CONCENTRATORD_* are set
      - /tmp:/tmp
    environment:
      - TZ=Africa/Nairobi
      # Concentratord ZMQ (required for uplink/downlink; leave unset for provisioning-only)
      - CONCENTRATORD_EVENT_URL=${CONCENTRATORD_EVENT_URL:-}
      - CONCENTRATORD_COMMAND_URL=${CONCENTRATORD_COMMAND_URL:-}
      - CONCENTRATORD_GATEWAY_ID=${CONCENTRATORD_GATEWAY_ID:-}
    networks:
      - pi_network

volumes:
  pi_pb_data:

networks:
  pi_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
