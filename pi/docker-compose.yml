# pi: PocketBase backend (LoRaWAN + codec + store) + Angular frontend
# No ChirpStack/MQTT/Postgres/Redis. Backend talks to Concentratord via ZMQ when configured.
# Device provisioning: POST /api/devices, GET /api/devices/credentials?eui=...

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pi-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pi_pb_data:/app/pb_data
    environment:
      - TZ=Africa/Nairobi
      # Codec (default /app/codec.js in image)
      - CODEC_PATH=/app/codec.js
      # Concentratord ZMQ (required for uplink/downlink; leave unset for provisioning-only)
      - CONCENTRATORD_EVENT_URL=${CONCENTRATORD_EVENT_URL:-}
      - CONCENTRATORD_COMMAND_URL=${CONCENTRATORD_COMMAND_URL:-}
      - CONCENTRATORD_GATEWAY_ID=${CONCENTRATORD_GATEWAY_ID:-}
    networks:
      - pi_network

volumes:
  pi_pb_data:

networks:
  pi_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
