# pi: PocketBase backend (LoRaWAN + codec + store) + Angular frontend
# No ChirpStack/MQTT/Postgres/Redis. Backend talks to Concentratord via ZMQ when configured.
# Gateway config is set only from the UI (stored in DB). No CONCENTRATORD_* env vars.
# After first deploy: open /settings, fill gateway settings (region, event_url, command_url), Save to enable the pipeline.
# If concentratord runs on the host, mount /tmp so the backend can use IPC: - /tmp:/tmp

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pi-backend
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pi_pb_data:/app/pb_data
      - /tmp:/tmp
    environment:
      - TZ=Africa/Nairobi
    networks:
      - pi_network

volumes:
  pi_pb_data:

networks:
  pi_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
