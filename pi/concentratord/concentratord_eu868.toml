# ChirpStack concentratord main config for EU868. Use with channels_eu868.toml.
# Run: chirpstack-concentratord-sx1302 -c /etc/chirpstack-concentratord/concentratord_eu868.toml -c /etc/chirpstack-concentratord/channels_eu868.toml

[concentratord]
log_level = "DEBUG"
log_to_syslog = false
stats_interval = "30s"

[concentratord.api]
event_bind = "ipc:///tmp/concentratord_event"
command_bind = "ipc:///tmp/concentratord_command"

[gateway]
antenna_gain = 0
lorawan_public = true
region = "EU868"
model = "waveshare_sx1302_lorawan_gateway_hat"
model_flags = []
gateway_id = ""
time_fallback_enabled = true
# GPIO 17: SX1302 reset. GPIO 23 is Pi SD0 CMD → EBUSY on many Pi OS.
# sx1302_power_en_pin disabled: asserting GPIO 18 during startup causes SX1250_0 STANDBY_RC
# failure on this board. The HAT's onboard regulator powers the RF chain; no GPIO PWREN needed.
# Re-enable if your board variant has a dedicated PWREN line on GPIO 18.
sx1302_reset_chip = "/dev/gpiochip0"
sx1302_reset_pin = 17
# sx1302_power_en_chip = "/dev/gpiochip0"
# sx1302_power_en_pin = 18

[gateway.com_dev]
device = "/dev/spidev0.0"

[gateway.i2c_dev]
device = "/dev/i2c-1"
temp_sensor_addr = 0x39

# [gateway.concentrator] is in channels_eu868.toml (multi_sf_channels, lora_std, fsk).
