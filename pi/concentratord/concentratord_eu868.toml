# ChirpStack concentratord main config for EU868. Use with channels_eu868.toml.
# Run: chirpstack-concentratord-sx1302 -c /etc/chirpstack-concentratord/concentratord_eu868.toml -c /etc/chirpstack-concentratord/channels_eu868.toml

[concentratord]
log_level = "DEBUG"
log_to_syslog = false
stats_interval = "30s"

[concentratord.api]
event_bind = "ipc:///tmp/concentratord_event"
command_bind = "ipc:///tmp/concentratord_command"

[gateway]
antenna_gain = 0
lorawan_public = true
region = "EU868"
model = "waveshare_sx1302_lorawan_gateway_hat"
model_flags = []
gateway_id = ""
time_fallback_enabled = true
# Reset / power-enable: same reference values as US915 (23, 18). If EBUSY on Pi, try sx1302_reset_pin = 17. See README.
sx1302_reset_chip = "/dev/gpiochip0"
sx1302_reset_pin = 23
sx1302_power_en_chip = "/dev/gpiochip0"
sx1302_power_en_pin = 18

[gateway.com_dev]
device = "/dev/spidev0.0"

[gateway.i2c_dev]
device = "/dev/i2c-1"
temp_sensor_addr = 0x39

[[gateway.concentrator.radios]]
enabled = true
type = "SX1250"
freq = 868300000
rssi_offset = -215.4
tx_enable = true
tx_freq_min = 863000000
tx_freq_max = 870000000

[[gateway.concentrator.radios]]
enabled = true
type = "SX1250"
freq = 867900000
rssi_offset = -215.4
tx_enable = false
