# ChirpStack concentratord channel config for US915 (Waveshare SX1302 HAT).
# Install to /etc/chirpstack-concentratord/ and run:
#   chirpstack-concentratord-sx1302 -c /etc/chirpstack-concentratord/concentratord.toml -c /etc/chirpstack-concentratord/channels_us915.toml
#
# lora_std is set to 904.6 MHz (uplink band) so all 9 channels fit in the two radios at startup;
# otherwise concentratord fails with "the channels do not fit within the bandwidth of the two radios".
# The actual Class A downlink frequency (923.3 MHz or 923.3 + offset) is taken from the downlink
# frame (TxInfo.Frequency) sent by the backend; the gateway TXes at that frequency at runtime.

[gateway.concentrator]
# 8 uplink channels (required by concentratord for US915). Backend sends per-uplink RX1 freq so JoinAccept matches device.
multi_sf_channels = [
  903900000,
  904100000,
  904300000,
  904500000,
  904700000,
  904900000,
  905100000,
  905300000,
]

# LoRa std channel: frequency in uplink band so daemon starts; actual TX freq comes from DownlinkFrame.
[gateway.concentrator.lora_std]
frequency = 904600000
bandwidth = 500000
spreading_factor = 8
