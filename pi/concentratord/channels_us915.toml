# ChirpStack concentratord channel config for US915 (Waveshare SX1302 HAT).
# Install to /etc/chirpstack-concentratord/ and run:
#   chirpstack-concentratord-sx1302 -c /etc/chirpstack-concentratord/concentratord.toml -c /etc/chirpstack-concentratord/channels_us915.toml
#
# CRITICAL: lora_std must be 923.3 MHz so Class A downlink (JoinAccept) is transmitted
# where the device listens for RX1. If lora_std is in the uplink band (902–915 MHz),
# the device never receives the JoinAccept.

[gateway.concentrator]
# Single uplink channel (903.9 MHz = US915 ch 8) so device RX1 is always 923.3 MHz, matching lora_std.
# Trade-off: we only receive joins on 903.9 MHz; ensure devices use sub-band 2 and prefer ch 8 for join.
multi_sf_channels = [
  903900000,
]

# Single downlink channel for Class A RX1. Must be 923–927.5 MHz for US915.
[gateway.concentrator.lora_std]
frequency = 923300000
bandwidth = 500000
spreading_factor = 12
