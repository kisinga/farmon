# ChirpStack concentratord main config for US915 (915 MHz HAT). Use with channels_us915.toml.
# Run: chirpstack-concentratord-sx1302 -c /etc/chirpstack-concentratord/concentratord.toml -c /etc/chirpstack-concentratord/channels_us915.toml

[concentratord]
log_level = "DEBUG"
log_to_syslog = false
stats_interval = "30s"

[concentratord.api]
event_bind = "ipc:///tmp/concentratord_event"
command_bind = "ipc:///tmp/concentratord_command"

[gateway]
# Minimum 2 dBi recommended to avoid duty-cycle downlink rejection (ChirpStack concentratord #157).
antenna_gain = 2
lorawan_public = true
region = "US915"
model = "waveshare_sx1302_lorawan_gateway_hat"
model_flags = []
gateway_id = ""
time_fallback_enabled = true
# Reset pin: GPIO17 on the Waveshare SX1302 HAT.
# Pi 4 and earlier: gpiochip0 is the 40-pin header.
# Pi 5: gpiochip4 is the 40-pin header (gpiochip0 is an internal RP1 bank).
# setup_gateway.sh detects the correct chip at install time and writes the installed TOML.
# If installing manually, run: ls /dev/gpiochip* → use gpiochip4 on Pi 5, gpiochip0 on Pi 4.
sx1302_reset_chip = "/dev/gpiochip4"
sx1302_reset_pin = 17
# The Waveshare SX1302 915M HAT B uses an onboard regulator — no GPIO power enable needed.
# Explicitly disable power_en to override the model's default of pin 18, which causes
# "Failed to set SX1250_0 in STANDBY_RC mode" on this board variant.
sx1302_power_en_chip = ""
sx1302_power_en_pin = 0

[gateway.com_dev]
device = "/dev/spidev0.0"

[gateway.i2c_dev]
device = "/dev/i2c-1"
temp_sensor_addr = 0x39

# [gateway.concentrator] (multi_sf_channels, lora_std, fsk) is in channels_us915.toml.
# Do not add [[gateway.concentrator.radios]] here or the daemon can end up with a concentrator
# section missing multi_sf_channels and fail with "missing field multi_sf_channels".
